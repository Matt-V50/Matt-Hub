// ═══ State ═══
let currentTab = 'all';
let currentSearch = '';

// ═══ Filter logic ═══
function getFiltered() {
  return DATA.filter(f => {
    if (currentTab !== 'all' && f.cat !== currentTab) return false;
    if (!currentSearch) return true;
    const s = currentSearch.toLowerCase();
    const haystack = [f.zh, f.en, f.alt||'', f.genus, f.zhOrigin, f.etym, f.altEtym||'', f.morph, f.members].join(' ').toLowerCase();
    return haystack.includes(s);
  });
}

// ═══ Card builder ═══
function buildCard(f, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cat = f.cat;

  const catColor = CAT_COLORS[f.cat] || '#888';
  const catLabels = {core:'主要大科', food:'吃货相关', garden:'花园常见', tree:'乔木为主', trail:'徒步常见'};

  let altH = f.alt ? `<span class="alt-latin">(${f.alt})</span>` : '';
  let altEtymH = f.altEtym ? `<div class="info-row" style="margin-top:4px;opacity:.8">↳ 保留名: ${f.altEtym}</div>` : '';

  card.innerHTML = `
    <div class="stripe" style="background:${catColor}"></div>
    <div class="card-top">
      <span class="cat-pill" style="background:${catColor}">${catLabels[f.cat]}</span>
      <span class="name-zh">${f.zh}</span>
      <span class="name-en">${f.en}</span>${altH}
      <div class="etym-block">
        <span class="info-label">中文名源</span>
        ${f.zhOrigin}
      </div>
      <div style="margin-top:8px">
        <span class="info-label">模式属</span>
        <span class="genus-badge">${f.genus}</span>
      </div>
      <div class="info-row" style="margin-top:8px">
        <span class="info-label">拉丁词源</span>
        ${f.etym}
      </div>
      ${altEtymH}
      <div class="info-row" style="margin-top:8px">
        <span class="info-label">🔍 野外怎么认</span>
        <div class="morph-inline">${f.morph}</div>
      </div>
      <div class="members-row">
        <span class="info-label">你认识的成员</span>
        ${f.members}
      </div>
    </div>
  `;
  return card;
}

// ═══ Render ═══
const grid = document.getElementById('grid');
const noResults = document.getElementById('no-results');

function render() {
  const items = getFiltered();
  grid.innerHTML = '';
  noResults.style.display = items.length ? 'none' : 'block';
  items.forEach((f, i) => {
    const card = buildCard(f, i);
    grid.appendChild(card);
  });
  // staggered layout
  requestAnimationFrame(() => relayout());
}

// ═══ Masonry layout (same logic as sugars.html) ═══
let _laying = false;
function relayout() {
  if (_laying) return;
  _laying = true;
  const cards = [...grid.querySelectorAll(':scope > .card')];
  if (!cards.length) { grid.style.height = '0px'; _laying = false; return; }
  const isMobile = window.innerWidth <= 640;
  const cols = isMobile ? 1 : 2;
  const gap = 18;
  const colW = (grid.offsetWidth - (cols - 1) * gap) / cols;
  const colH = Array(cols).fill(0);

  cards.forEach(card => {
    card.style.width = colW + 'px';
    const col = colH[0] <= (colH[1] ?? Infinity) ? 0 : 1;
    card.style.left = col * (colW + gap) + 'px';
    card.style.top = colH[col] + 'px';
    colH[col] += card.offsetHeight + gap;
  });
  grid.style.height = Math.max(...colH) + 'px';
  _laying = false;
}

// ═══ Tab switching ═══
function showTab(cat) {
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent.includes(
      {all:'全部',core:'主要',food:'吃货',garden:'花园',tree:'乔木',trail:'徒步'}[cat]
    ));
  });
  render();
}

// ═══ Search ═══
function doFilter() {
  currentSearch = document.getElementById('search').value.trim();
  render();
}

// ═══ Resize ═══
window.addEventListener('resize', relayout);

// ═══ ResizeObserver for accordion open/close (debounced to avoid loop) ═══
let _roTimer = null;
const ro = new ResizeObserver(() => {
  if (_roTimer) cancelAnimationFrame(_roTimer);
  _roTimer = requestAnimationFrame(() => { _roTimer = null; relayout(); });
});
new MutationObserver(mutations => {
  mutations.forEach(m => m.addedNodes.forEach(n => {
    if (n.classList && n.classList.contains('card')) ro.observe(n);
  }));
}).observe(grid, { childList: true });

// ═══ Init ═══
render();
</script>
