name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'pages/**/*.html'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache model weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            /root/.cache/huggingface
          key: hf-multilingual-minilm-${{ runner.os }}

      - name: Install dependencies
        run: npm install

      - name: Generate site.json + embeddings.json
        run: npm run embeddings

      # 把要部署的文件复制到 _site/，绕开 .gitignore 对 data/ 的影响
      - name: Prepare deploy directory
        run: |
          mkdir _site
          cp index.html _site/
          [ -d pages ]  && cp -r pages  _site/ || true
          [ -d data ]   && cp -r data   _site/ || true
          [ -d assets ] && cp -r assets _site/ || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages